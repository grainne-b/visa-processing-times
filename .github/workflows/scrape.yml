name: Scrape processing times

on:
  schedule:
    - cron: '0 4 * * *'  # 2pm AEST (UTC+10) daily
  workflow_dispatch:       # allow manual runs from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to commit data + README back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Install Playwright + Chromium system deps
        run: uv run playwright install chromium --with-deps

      - name: Run scraper
        run: uv run main.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ README.md
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "chore: scrape $(date -u '+%Y-%m-%d')" && git push
